<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Itera — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #222;
    }

    /* ── NAVBAR ── */
    nav {
      background: #b71c1c;
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      height: 56px;
      gap: 0.5rem;
      position: relative;
      z-index: 100;
    }

    .nav-item {
      position: relative;
    }

    .nav-item > button {
      background: none;
      border: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: background 0.15s;
    }

    .nav-item > button:hover,
    .nav-item:focus-within > button {
      background: rgba(255,255,255,0.15);
    }

    .nav-item > button svg {
      width: 10px;
      height: 10px;
      opacity: 0.8;
      transition: transform 0.2s;
    }

    .nav-item:focus-within > button svg,
    .nav-item:hover > button svg {
      transform: rotate(180deg);
    }

    /* Dropdown */
    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      min-width: 180px;
      overflow: hidden;
    }

    .nav-item:hover .dropdown,
    .nav-item:focus-within .dropdown {
      display: block;
    }

    .dropdown a {
      display: block;
      padding: 0.65rem 1.1rem;
      font-size: 0.85rem;
      color: #333;
      text-decoration: none;
      transition: background 0.12s;
    }

    .dropdown a:hover {
      background: #fdf0f0;
      color: #b71c1c;
    }

    /* ── MAIN CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    img.logo {
      width: 140px;
      height: auto;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #b71c1c;
      border-radius: 2px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
    }

    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: #666;
    }
  </style>
</head>
<body>

  <nav>
    <!-- Clubs -->
    <div class="nav-item">
      <button>Clubs <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="dropdown">
        <a href="#">Club de Programación</a>
        <a href="#">Club de Robótica</a>
        <a href="#">Club de IA</a>
      </div>
    </div>

    <!-- Proyectos -->
    <div class="nav-item">
      <button>Proyectos <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="dropdown">
        <a href="#">Proyectos Activos</a>
        <a href="#">Proyectos Finalizados</a>
        <a href="#">Proponer Proyecto</a>
      </div>
    </div>

    <!-- Quiénes Somos -->
    <div class="nav-item">
      <button>Quiénes Somos <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="dropdown">
        <a href="#">El Equipo</a>
        <a href="#">Misión y Valores</a>
        <a href="#">Historia</a>
      </div>
    </div>

    <!-- Contacto -->
    <div class="nav-item">
      <button>Contacto <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l4 4 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="dropdown">
        <a href="#">Formulario de Contacto</a>
        <a href="#">Redes Sociales</a>
        <a href="#">Email</a>
      </div>
    </div>
  </nav>

  <div class="content">
    <img class="logo" src="Itera.png" alt="Itera logo" />
    <div class="divider"></div>
    <h1>Work in Progress</h1>
    <p>We're working on something great. Check back soon.</p>
  </div>

</body>
</html>
